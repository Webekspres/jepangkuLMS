name: deploy

on:
  push:
    branches:
      - dev-sultan
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-lms-${{ github.ref }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run lint
      - run: bun test
      - run: bun run build
        if: github.ref == 'refs/heads/dev-sultan' && github.event_name != 'workflow_dispatch'
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          JEPANGKU_CORE_API_URL: http://localhost:8080
          JEPANGKU_CORE_JWT_ISSUER: https://core.jepangku.com
          JEPANGKU_CORE_JWT_AUDIENCE: jepangku
          JEPANGKU_CORE_JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuD1rWw+ly5wBc7bI22Hv\nuJEIx8lgxGuPwKg55nQsEv2BZufqQSRBQoT9Nk+nCEEt6/hZYuFmzIC52AVRDXCX\nFEnmZOjuqJsVkXFEVZPRCcgkSNrnLBnZShAlcNRvreHQnITwU1BOefKVcGucpxXd\nTo+AEE52ajYdh2dAE8pvxzbqRVTsLe51G+SyXcvZTR9Zthjc5sqpQzDgAt4CXTDD\nnPoB046y1I8k2CNL5MK7gWqjnUADaHwqzdOF/2Ayc6fnNnKkFt9zAGWR0O0yg+mJ\n2HpmLa9I4aXxc0Is2sgv7AW3OITFSakfMMhkCR8qhjhnOIeal71G9sC9quXCXPWR\nFQIDAQAB\n-----END PUBLIC KEY-----"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          PAYMENT_BANK_NAME: BCA
          PAYMENT_ACCOUNT_NAME: CI Build
          PAYMENT_ACCOUNT_NUMBER: "0000000000"

  build:
    needs: test
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')) && 'production' || 'staging' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      migrate_tag: ${{ steps.meta.outputs.migrate_tag }}
      migrate_sha_tag: ${{ steps.meta.outputs.migrate_sha_tag }}
      app_url: ${{ steps.meta.outputs.app_url }}
      sign_in_url: ${{ steps.meta.outputs.sign_in_url }}
      sign_up_url: ${{ steps.meta.outputs.sign_up_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Clerk build secret
        run: |
          if [ -z "${{ secrets.CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "::error::CLERK_PUBLISHABLE_KEY is empty. Add it to the environment secrets."
            exit 1
          fi

      - name: Resolve image tag
        id: meta
        run: |
          echo "image=ghcr.io/webekspres/jepangku-lms" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi

          if [ "$TARGET" = "production" ]; then
            echo "version_tag=latest" >> "$GITHUB_OUTPUT"
            echo "migrate_tag=migrate-latest" >> "$GITHUB_OUTPUT"
            echo "app_url=https://kursus.jepangku.com" >> "$GITHUB_OUTPUT"
            echo "sign_in_url=https://kursus.jepangku.com/sign-in" >> "$GITHUB_OUTPUT"
            echo "sign_up_url=https://kursus.jepangku.com/sign-up" >> "$GITHUB_OUTPUT"
            echo "core_integration_ui=true" >> "$GITHUB_OUTPUT"
            echo "core_api_url=http://jepangku-core:8080" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=staging" >> "$GITHUB_OUTPUT"
            echo "migrate_tag=migrate-staging" >> "$GITHUB_OUTPUT"
            echo "app_url=https://dev.kursus.jepangku.com" >> "$GITHUB_OUTPUT"
            echo "sign_in_url=https://dev.kursus.jepangku.com/sign-in" >> "$GITHUB_OUTPUT"
            echo "sign_up_url=https://dev.kursus.jepangku.com/sign-up" >> "$GITHUB_OUTPUT"
            echo "core_integration_ui=true" >> "$GITHUB_OUTPUT"
            echo "core_api_url=http://jepangku_staging_core:8081" >> "$GITHUB_OUTPUT"
          fi
          echo "migrate_sha_tag=migrate-sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ steps.meta.outputs.app_url }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ steps.meta.outputs.sign_in_url }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ steps.meta.outputs.sign_up_url }}
            NEXT_PUBLIC_CORE_INTEGRATION_UI=${{ steps.meta.outputs.core_integration_ui }}
            JEPANGKU_CORE_API_URL=${{ steps.meta.outputs.core_api_url }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          no-cache: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.migrate_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.migrate_sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    if: >
      needs.build.outputs.version_tag == 'staging' &&
      ((github.ref == 'refs/heads/staging' && github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'))
    runs-on: ubuntu-latest
    environment: staging
    permissions: {}
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      MIGRATE_IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.migrate_sha_tag }}
      LMS_IMAGE_TAG: staging
      HEALTH_URL: http://127.0.0.1:3003/
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          VPS_HOST="$(echo "$VPS_HOST" | tr -d ' \r\n')"
          VPS_PORT="$(echo "$VPS_PORT" | tr -d ' \r\n')"
          VPS_USER="$(echo "$VPS_USER" | tr -d ' \r\n')"
          test -n "$VPS_HOST" && test -n "$VPS_PORT" && test -n "$VPS_USER"

          install -m 700 -d ~/.ssh
          if [ -n "${VPS_SSH_KEY:-}" ] && [[ "$VPS_SSH_KEY" == -----BEGIN* ]]; then
            printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          elif [ -n "${VPS_SSH_KEY_B64:-}" ]; then
            echo "$VPS_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          else
            echo "::error::Set VPS_SSH_KEY or VPS_SSH_KEY_B64 in staging environment"
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          echo "VPS_HOST=$VPS_HOST" >> "$GITHUB_ENV"
          echo "VPS_PORT=$VPS_PORT" >> "$GITHUB_ENV"
          echo "VPS_USER=$VPS_USER" >> "$GITHUB_ENV"

      - name: Deploy LMS to staging VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s <<REMOTE
          set -euo pipefail
          export DEPLOY_PATH="/opt/jepangku-staging"
          export LMS_IMAGE_TAG="staging"
          export HEALTH_URL="http://127.0.0.1:3003/"
          export MIGRATE_IMAGE="$MIGRATE_IMAGE"

          cd "\$DEPLOY_PATH"
          set -a
          source .env
          set +a

          if [ -f deploy/scripts/vps-sync-client-env-from-core.py ]; then
            python3 deploy/scripts/vps-sync-client-env-from-core.py \
              --core-env "\$DEPLOY_PATH/.env" --client lms \
              --client-env "\$DEPLOY_PATH/lms/.env"
          fi

          # Override Core API URL — sync script mungkin mengambil nilai production
          # staging → jepangku_staging_core:8081, production → jepangku-core:8080
          if grep -q "^JEPANGKU_CORE_API_URL=" "\$DEPLOY_PATH/lms/.env"; then
            sed -i "s|^JEPANGKU_CORE_API_URL=.*|JEPANGKU_CORE_API_URL=http://jepangku_staging_core:8081|" "\$DEPLOY_PATH/lms/.env"
          else
            echo "JEPANGKU_CORE_API_URL=http://jepangku_staging_core:8081" >> "\$DEPLOY_PATH/lms/.env"
          fi

          # region agent log — pre-pull diagnostics (debug-cbc78f)
          echo "==> Pre-pull diagnostics (debug-cbc78f)"
          ROOT_USE=\$(df -P / | awk 'NR==2 {gsub(/%/,"",\$5); print \$5}')
          DOCKER_USE=\$(df -P /var/lib/docker 2>/dev/null | awk 'NR==2 {gsub(/%/,"",\$5); print \$5}' || echo "\$ROOT_USE")
          INGEST_DIR="/var/lib/containerd/io.containerd.content.v1.content/ingest"
          INGEST_COUNT=\$(find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 2>/dev/null | wc -l | tr -d ' ')
          echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"A\",\"message\":\"pre-pull-disk\",\"data\":{\"rootUsePct\":\${ROOT_USE:-null},\"dockerUsePct\":\${DOCKER_USE:-null},\"env\":\"staging\"}}"
          echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"B\",\"message\":\"pre-pull-ingest\",\"data\":{\"ingestCount\":\${INGEST_COUNT:-0},\"env\":\"staging\"}}"
          df -h / /var/lib/docker /var/lib/containerd 2>/dev/null || df -h
          docker system df || true
          # Proactive recovery from prior failed pulls (hypothesis B confirmed by rename ingest→blobs)
          if [ "\${INGEST_COUNT:-0}" -gt 0 ] 2>/dev/null; then
            echo "==> Clearing stale containerd ingest before pull (count=\$INGEST_COUNT)"
            find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
          fi
          if [ "\${ROOT_USE:-0}" -ge 85 ] 2>/dev/null || [ "\${DOCKER_USE:-0}" -ge 85 ] 2>/dev/null; then
            echo "==> Disk high before pull — safe prune (hypothesis A)"
            docker container prune -f || true
            docker image prune -a -f || true
            docker builder prune -a -f || true
          fi
          # endregion

          pull_image_resilient() {
            local image="\$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              echo "==> docker pull attempt \${attempt}/5: \$image"
              if docker pull "\$image"; then
                echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"D\",\"message\":\"pull-ok\",\"data\":{\"attempt\":\$attempt,\"image\":\"\$image\",\"env\":\"staging\"}}"
                return 0
              fi
              echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"D\",\"message\":\"pull-fail\",\"data\":{\"attempt\":\$attempt,\"image\":\"\$image\",\"env\":\"staging\"}}"
              if [ -d "\$INGEST_DIR" ]; then
                echo "==> Clearing incomplete containerd ingest (hypothesis B)"
                find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
              fi
              if [ "\${ROOT_USE:-0}" -ge 85 ] 2>/dev/null || [ "\${DOCKER_USE:-0}" -ge 85 ] 2>/dev/null; then
                echo "==> Disk high — safe docker prune (hypothesis A)"
                docker container prune -f || true
                docker image prune -a -f || true
                docker builder prune -a -f || true
              fi
              sleep \$((attempt * 5))
            done
            echo "::error::docker pull failed after 5 attempts: \$image"
            return 1
          }

          pull_image_resilient "\$MIGRATE_IMAGE"

          # Removed from repo after failed first apply (JlptQuestionSet did not exist yet).
          docker run --rm \
            --network jepangku_staging_net \
            -e DATABASE_URL="postgresql://\${DB_USER}:\${DB_PASSWORD}@jepangku_staging_db:5432/stg_jepangku_lms" \
            --entrypoint bunx \
            "\$MIGRATE_IMAGE" \
            prisma migrate resolve --rolled-back 20260710030027_refactor_bank_soal_arsitektur \
            || echo "migrate resolve skipped (not in failed state)"

          docker run --rm \
            --network jepangku_staging_net \
            -e DATABASE_URL="postgresql://\${DB_USER}:\${DB_PASSWORD}@jepangku_staging_db:5432/stg_jepangku_lms" \
            "\$MIGRATE_IMAGE" \
            || { echo "::error::prisma migrate deploy failed — check migrator logs above"; exit 1; }

          docker run --rm \
            --network jepangku_staging_net \
            -e DATABASE_URL="postgresql://\${DB_USER}:\${DB_PASSWORD}@jepangku_staging_db:5432/stg_jepangku_lms" \
            --entrypoint bunx \
            "\$MIGRATE_IMAGE" \
            prisma migrate status

          for attempt in 1 2 3 4 5; do
            echo "==> docker compose pull lms attempt \${attempt}/5"
            if docker compose pull lms; then
              echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"hypothesisId\":\"D\",\"message\":\"compose-pull-ok\",\"data\":{\"attempt\":\$attempt,\"env\":\"staging\"}}"
              break
            fi
            echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"hypothesisId\":\"D\",\"message\":\"compose-pull-fail\",\"data\":{\"attempt\":\$attempt,\"env\":\"staging\"}}"
            if [ -d "\$INGEST_DIR" ]; then
              find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
            fi
            [ "\$attempt" -eq 5 ] && { echo "::error::docker compose pull lms failed"; exit 1; }
            sleep \$((attempt * 5))
          done
          # JEPANGKU_CORE_API_URL sudah di-override di lms/.env lewat sed di atas
          docker compose up -d --force-recreate lms

          for i in \$(seq 1 30); do
            if curl -fsS http://127.0.0.1:3003/ >/dev/null 2>&1; then
              echo "Health OK"
              break
            fi
            [ "\$i" -eq 30 ] && { echo "Health check failed"; exit 1; }
            echo "Waiting for LMS... (\$i/30)"
            sleep 3
          done

          curl -fsS "\$HEALTH_URL"
          echo "Deploy OK: lms @ staging"

          echo "==> Prune unused Docker resources (safe)"
          if [ -f "\${DEPLOY_PATH}/deploy/scripts/vps-docker-prune-safe.sh" ]; then
            bash "\${DEPLOY_PATH}/deploy/scripts/vps-docker-prune-safe.sh"
          else
            docker container prune -f
            docker image prune -a -f
            docker builder prune -a -f
          fi
          REMOTE

  deploy-production:
    needs: build
    if: >
      needs.build.outputs.version_tag == 'latest' &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'production'))
    runs-on: ubuntu-latest
    environment: production
    permissions: {}
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      MIGRATE_IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.migrate_sha_tag }}
      LMS_IMAGE_TAG: latest
      HEALTH_URL: http://127.0.0.1:3002/
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          VPS_HOST="$(echo "$VPS_HOST" | tr -d ' \r\n')"
          VPS_PORT="$(echo "$VPS_PORT" | tr -d ' \r\n')"
          VPS_USER="$(echo "$VPS_USER" | tr -d ' \r\n')"
          test -n "$VPS_HOST" && test -n "$VPS_PORT" && test -n "$VPS_USER"

          install -m 700 -d ~/.ssh
          if [ -n "${VPS_SSH_KEY:-}" ] && [[ "$VPS_SSH_KEY" == -----BEGIN* ]]; then
            printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          elif [ -n "${VPS_SSH_KEY_B64:-}" ]; then
            echo "$VPS_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          else
            echo "::error::Set VPS_SSH_KEY or VPS_SSH_KEY_B64 in production environment"
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          echo "VPS_HOST=$VPS_HOST" >> "$GITHUB_ENV"
          echo "VPS_PORT=$VPS_PORT" >> "$GITHUB_ENV"
          echo "VPS_USER=$VPS_USER" >> "$GITHUB_ENV"

      - name: Deploy LMS to production VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s <<REMOTE
          set -euo pipefail
          export DEPLOY_PATH="/opt/jepangku"
          export LMS_IMAGE_TAG="latest"
          export HEALTH_URL="http://127.0.0.1:3002/"
          export MIGRATE_IMAGE="$MIGRATE_IMAGE"

          cd "\$DEPLOY_PATH"
          set -a
          source .env
          set +a

          if [ -f deploy/scripts/vps-sync-client-env-from-core.py ]; then
            python3 deploy/scripts/vps-sync-client-env-from-core.py --client lms
          fi

          # Override Core API URL — sync script mungkin mengambil nilai staging
          # production → jepangku-core:8080
          if grep -q "^JEPANGKU_CORE_API_URL=" "\$DEPLOY_PATH/lms/.env"; then
            sed -i "s|^JEPANGKU_CORE_API_URL=.*|JEPANGKU_CORE_API_URL=http://jepangku-core:8080|" "\$DEPLOY_PATH/lms/.env"
          else
            echo "JEPANGKU_CORE_API_URL=http://jepangku-core:8080" >> "\$DEPLOY_PATH/lms/.env"
          fi

          # region agent log — pre-pull diagnostics (debug-cbc78f)
          echo "==> Pre-pull diagnostics (debug-cbc78f)"
          ROOT_USE=\$(df -P / | awk 'NR==2 {gsub(/%/,"",\$5); print \$5}')
          DOCKER_USE=\$(df -P /var/lib/docker 2>/dev/null | awk 'NR==2 {gsub(/%/,"",\$5); print \$5}' || echo "\$ROOT_USE")
          INGEST_DIR="/var/lib/containerd/io.containerd.content.v1.content/ingest"
          INGEST_COUNT=\$(find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 2>/dev/null | wc -l | tr -d ' ')
          echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"A\",\"message\":\"pre-pull-disk\",\"data\":{\"rootUsePct\":\${ROOT_USE:-null},\"dockerUsePct\":\${DOCKER_USE:-null},\"env\":\"production\"}}"
          echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"B\",\"message\":\"pre-pull-ingest\",\"data\":{\"ingestCount\":\${INGEST_COUNT:-0},\"env\":\"production\"}}"
          df -h / /var/lib/docker /var/lib/containerd 2>/dev/null || df -h
          docker system df || true
          # Proactive recovery from prior failed pulls (hypothesis B confirmed by rename ingest→blobs)
          if [ "\${INGEST_COUNT:-0}" -gt 0 ] 2>/dev/null; then
            echo "==> Clearing stale containerd ingest before pull (count=\$INGEST_COUNT)"
            find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
          fi
          if [ "\${ROOT_USE:-0}" -ge 85 ] 2>/dev/null || [ "\${DOCKER_USE:-0}" -ge 85 ] 2>/dev/null; then
            echo "==> Disk high before pull — safe prune (hypothesis A)"
            docker container prune -f || true
            docker image prune -a -f || true
            docker builder prune -a -f || true
          fi
          # endregion

          pull_image_resilient() {
            local image="\$1"
            local attempt
            for attempt in 1 2 3 4 5; do
              echo "==> docker pull attempt \${attempt}/5: \$image"
              if docker pull "\$image"; then
                echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"D\",\"message\":\"pull-ok\",\"data\":{\"attempt\":\$attempt,\"image\":\"\$image\",\"env\":\"production\"}}"
                return 0
              fi
              echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"runId\":\"post-fix\",\"hypothesisId\":\"D\",\"message\":\"pull-fail\",\"data\":{\"attempt\":\$attempt,\"image\":\"\$image\",\"env\":\"production\"}}"
              if [ -d "\$INGEST_DIR" ]; then
                echo "==> Clearing incomplete containerd ingest (hypothesis B)"
                find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
              fi
              if [ "\${ROOT_USE:-0}" -ge 85 ] 2>/dev/null || [ "\${DOCKER_USE:-0}" -ge 85 ] 2>/dev/null; then
                echo "==> Disk high — safe docker prune (hypothesis A)"
                docker container prune -f || true
                docker image prune -a -f || true
                docker builder prune -a -f || true
              fi
              sleep \$((attempt * 5))
            done
            echo "::error::docker pull failed after 5 attempts: \$image"
            return 1
          }

          pull_image_resilient "\$MIGRATE_IMAGE"

          docker run --rm \
            --network jepangku_net \
            -e DATABASE_URL="postgresql://\${DB_USER}:\${DB_PASSWORD}@jepangku_db:5432/jepangku_lms" \
            --entrypoint bunx \
            "\$MIGRATE_IMAGE" \
            prisma migrate resolve --rolled-back 20260710030027_refactor_bank_soal_arsitektur \
            || echo "migrate resolve skipped (not in failed state)"

          docker run --rm \
            --network jepangku_net \
            -e DATABASE_URL="postgresql://\${DB_USER}:\${DB_PASSWORD}@jepangku_db:5432/jepangku_lms" \
            "\$MIGRATE_IMAGE" \
            || { echo "::error::prisma migrate deploy failed — check migrator logs above"; exit 1; }

          docker run --rm \
            --network jepangku_net \
            -e DATABASE_URL="postgresql://\${DB_USER}:\${DB_PASSWORD}@jepangku_db:5432/jepangku_lms" \
            --entrypoint bunx \
            "\$MIGRATE_IMAGE" \
            prisma migrate status

          for attempt in 1 2 3 4 5; do
            echo "==> docker compose pull lms attempt \${attempt}/5"
            if docker compose pull lms; then
              echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"hypothesisId\":\"D\",\"message\":\"compose-pull-ok\",\"data\":{\"attempt\":\$attempt,\"env\":\"production\"}}"
              break
            fi
            echo "DEBUG_CBC78F {\"sessionId\":\"cbc78f\",\"hypothesisId\":\"D\",\"message\":\"compose-pull-fail\",\"data\":{\"attempt\":\$attempt,\"env\":\"production\"}}"
            if [ -d "\$INGEST_DIR" ]; then
              find "\$INGEST_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
            fi
            [ "\$attempt" -eq 5 ] && { echo "::error::docker compose pull lms failed"; exit 1; }
            sleep \$((attempt * 5))
          done
          # JEPANGKU_CORE_API_URL sudah di-override di lms/.env lewat sed di atas
          docker compose up -d --force-recreate lms

          for i in \$(seq 1 30); do
            if curl -fsS http://127.0.0.1:3002/ >/dev/null 2>&1; then
              echo "Health OK"
              break
            fi
            [ "\$i" -eq 30 ] && { echo "Health check failed"; exit 1; }
            echo "Waiting for LMS... (\$i/30)"
            sleep 3
          done

          curl -fsS "\$HEALTH_URL"
          echo "Deploy OK: lms @ latest"

          echo "==> Prune unused Docker resources (safe)"
          if [ -f "\${DEPLOY_PATH}/deploy/scripts/vps-docker-prune-safe.sh" ]; then
            bash "\${DEPLOY_PATH}/deploy/scripts/vps-docker-prune-safe.sh"
          else
            docker container prune -f
            docker image prune -a -f
            docker builder prune -a -f
          fi
          REMOTE
